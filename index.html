<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>織杜 - 森林境界リレー合意システム</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

    <style>
        :root { --red: #FF4757; --yellow: #FFD32A; --green: #00B900; --web3: #8247E5; }
        body { margin: 0; font-family: sans-serif; background: #f8f9fa; color: #333; overflow: hidden; height: 100vh; }
        .view { display: none; height: 100vh; flex-direction: column; overflow-y: auto; }
        .view.active { display: flex; }
        
        /* 入力エリア */
        #entry-view, #kyc-view { align-items: center; justify-content: center; padding: 30px; text-align: center; background: white; }
        .input-code { width: 100%; padding: 20px; font-size: 24px; border: 2px solid #ddd; border-radius: 15px; margin: 20px 0; text-align: center; letter-spacing: 5px; }
        
        /* 地図エリア */
        #map-area { flex: 1; position: relative; width: 100%; min-height: 40vh; }
        #map { position: absolute; top:0; bottom:0; width:100%; }

        /* 詳細表示（スプリット） */
        #detail-area { background: #fff; border-top: 5px solid var(--green); display: none; padding: 15px; overflow-y: auto; height: 50vh; }
        body.mode-split #detail-area { display: block; }
        
        .upload-card { border: 2px dashed #ccc; border-radius: 15px; padding: 20px; background: #fff; margin-bottom: 15px; width: 100%; }
        .preview-img { width: 100%; border-radius: 10px; margin-top: 10px; display: none; border: 1px solid #eee; }
        #sig-canvas { border: 2px dashed #ccc; background: #fff; border-radius: 12px; touch-action: none; width: 100%; height: 150px; }
        
        .btn { width: 100%; padding: 18px; border: none; border-radius: 14px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--green); color: white; }
        .btn-web3 { background: var(--web3); color: white; }
        
        /* 写真グリッド */
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .photo-item { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 4/3; background: #eee; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        .photo-badge { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.6); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="entry-view" class="view active">
    <h1 style="color:var(--green)">織杜 - ORITO</h1>
    <p>森林招待コードを入力してください</p>
    <input type="text" id="invite-input" class="input-code" placeholder="CODE001">
    <button class="btn btn-primary" onclick="verifyCode()">境界を確認する</button>
</div>

<div id="kyc-view" class="view">
    <h3>本人確認 & 現場記録</h3>
    <div class="upload-card">
        <p style="font-size:12px;">【必須】身分証明書 (eKYC)</p>
        <button class="btn" style="background:#f0f0f0;" onclick="document.getElementById('file-kyc').click()">📷 カメラを起動</button>
        <input type="file" id="file-kyc" accept="image/*" capture="environment" style="display:none" onchange="handlePreview(this, 'preview-kyc')">
        <img id="preview-kyc" class="preview-img">
    </div>
    <div class="upload-card">
        <p style="font-size:12px;">【任意】現場の追加状況写真</p>
        <button class="btn" style="background:#f0f0f0;" onclick="document.getElementById('file-site').click()">📷 現場を撮る</button>
        <input type="file" id="file-site" accept="image/*" capture="environment" style="display:none" onchange="handlePreview(this, 'preview-site')">
        <img id="preview-site" class="preview-img">
    </div>
    <button class="btn btn-primary" onclick="changeView('map-view')">地図で境界点を確認</button>
</div>

<div id="map-view" class="view">
    <div id="map-area"><div id="map"></div></div>
    <div id="detail-area">
        <h4 id="parcel-num" style="margin:0;">地番: ---</h4>
        <p id="progress-status" style="font-size:12px; font-weight:bold;"></p>
        <div id="existing-photos" class="photo-grid"></div>
        <textarea id="owner-msg" style="width:100%; height:60px; border-radius:10px; border:1px solid #ddd; padding:10px;" placeholder="要望・メッセージ"></textarea>
        <button class="btn btn-primary" onclick="changeView('agree-view')">この境界で合意する</button>
        <button class="btn" style="background:#eee;" onclick="closeDetail()">✕ 閉じる</button>
    </div>
</div>

<div id="agree-view" class="view" style="padding:20px; background:white;">
    <h3>最終署名</h3>
    <p id="sign-role" style="font-size:13px; color:var(--web3); font-weight:bold;"></p>
    <canvas id="sig-canvas"></canvas>
    <button onclick="clearSig()" style="border:none; background:none; color:red; font-size:12px;">書き直す</button>
    <button class="btn btn-web3" onclick="finalizeRelay()">署名してデジタル証明書を発行</button>
</div>

<script>
    const supabaseClient = window.supabase.createClient('https://uggpclqqyaailuadgzxv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnZ3BjbHFxeWFhaWx1YWRnenh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MzE0NTgsImV4cCI6MjA5MDEwNzQ1OH0.jY5jJuJUgwbIZm8y-jJvEH27eAP9m9semR3MbLxVxGo');
    
    let targetData, mapInstance, pointFeatures = [];
    let sigCanvas, sigCtx, isA = true;

    async function init() {
        try { await liff.init({ liffId: "2009576392-CvuNETRQ" }); } catch(e) {}
        initSignature();
    }

    // 補助関数：URL抽出
    function getUrls(data) {
        if (!data) return [];
        if (Array.isArray(data)) return data.filter(u => String(u).startsWith('http'));
        const matches = String(data).match(/https?:\/\/[^\s,"{}]+/g);
        return matches ? matches.map(u => u.replace(/[\]\}\s,]+$/, '')) : [];
    }

    async function verifyCode() {
        const code = document.getElementById('invite-input').value.toUpperCase().trim();
        const { data, error } = await supabaseClient.from('forest_plots').select('*').eq('invitation_code', code).single();
        if (error || !data) return alert("無効なコードです");
        targetData = data;
        isA = !data.sig_a_done;
        document.getElementById('sign-role').innerText = isA ? "あなたは【甲：地権者】として署名します" : "あなたは【乙：隣接者】として署名します";
        changeView('kyc-view');
    }

    function initMap() {
        if (mapInstance) return;
        mapInstance = new maplibregl.Map({
            container: 'map',
            style: { "version": 8, "sources": { "gsi": { "type": "raster", "tiles": ["https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg"], "tileSize": 256 } }, "layers": [{ "id": "gsi", "type": "raster", "source": "gsi" }] },
            center: [131.39, 31.99], zoom: 17, preserveDrawingBuffer: true
        });

        mapInstance.on('load', async () => {
            const { data: geoData } = await supabaseClient.rpc('get_forest_geojson');
            const myFeat = geoData.features.find(f => f.properties.id === targetData.id);
            
            // 色決定
            const color = targetData.is_agreed ? "#00B900" : (targetData.sig_a_done ? "#FFD32A" : "#FF4757");

            // ポリゴン描画
            mapInstance.addSource('plot-src', { 'type': 'geojson', 'data': myFeat });
            mapInstance.addLayer({ 'id': 'fill', 'type': 'fill', 'source': 'plot-src', 'paint': { 'fill-opacity': 0.1, 'fill-color': '#fff' } });
            mapInstance.addLayer({ 'id': 'line', 'type': 'line', 'source': 'plot-src', 'paint': { 'line-color': color, 'line-width': 6 } });

            // 以前のロジック：写真URLから境界線上にポイントを作成
            const photos = getUrls(targetData.evidence_photo_url);
            let ring = (myFeat.geometry.type === 'MultiPolygon') ? myFeat.geometry.coordinates[0][0] : myFeat.geometry.coordinates[0];
            
            pointFeatures = photos.map((url, i) => {
                const step = Math.floor((i / photos.length) * (ring.length - 1));
                return {
                    "type": "Feature",
                    "geometry": { "type": "Point", "coordinates": ring[step] },
                    "properties": { "idx": (i + 1).toString(), "url": url }
                };
            });

            mapInstance.addSource('pts-src', { 'type': 'geojson', 'data': { "type": "FeatureCollection", "features": pointFeatures } });
            mapInstance.addLayer({ 'id': 'pts-c', 'type': 'circle', 'source': 'pts-src', 'paint': { 'circle-radius': 12, 'circle-color': '#007bff', 'circle-stroke-width': 2, 'circle-stroke-color': '#fff' } });
            mapInstance.addLayer({ 'id': 'pts-l', 'type': 'symbol', 'source': 'pts-src', 'layout': { 'text-field': ['get', 'idx'], 'text-size': 11 }, 'paint': { 'text-color': '#fff' } });

            // クリックイベントの登録
            mapInstance.on('click', 'fill', () => showDetail());
            mapInstance.on('click', 'pts-c', () => showDetail());

            // 範囲を自動調整
            const bounds = new maplibregl.LngLatBounds();
            ring.forEach(c => bounds.extend(c));
            mapInstance.fitBounds(bounds, { padding: 50 });
        });
    }

    function showDetail() {
        document.getElementById('parcel-num').innerText = `地番: ${targetData.parcel_number}`;
        const photos = getUrls(targetData.evidence_photo_url);
        document.getElementById('existing-photos').innerHTML = photos.map((u, i) => `<div class="photo-item"><span class="photo-badge">No.${i+1}</span><img src="${u}"></div>`).join('');
        
        document.body.classList.add('mode-split');
        setTimeout(() => mapInstance.resize(), 100);
    }

    function closeDetail() {
        document.body.classList.remove('mode-split');
        setTimeout(() => mapInstance.resize(), 100);
    }

    function changeView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'map-view') setTimeout(initMap, 300);
    }

    // 写真プレビュー（カメラ用）
    function handlePreview(input, imgId) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById(imgId);
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    }

    // 署名パッド初期化
    function initSignature() {
        sigCanvas = document.getElementById('sig-canvas');
        sigCtx = sigCanvas.getContext('2d');
        sigCanvas.width = sigCanvas.offsetWidth;
        sigCanvas.height = sigCanvas.offsetHeight;
        let drawing = false;
        const getPos = (e) => {
            const rect = sigCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        };
        const start = (e) => { drawing = true; sigCtx.beginPath(); const p = getPos(e); sigCtx.moveTo(p.x, p.y); };
        const move = (e) => { if(!drawing) return; const p = getPos(e); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); e.preventDefault(); };
        sigCanvas.addEventListener('mousedown', start); sigCanvas.addEventListener('mousemove', move); window.addEventListener('mouseup', () => drawing = false);
        sigCanvas.addEventListener('touchstart', start); sigCanvas.addEventListener('touchmove', move); window.addEventListener('touchend', () => drawing = false);
        sigCtx.lineWidth = 2; sigCtx.strokeStyle = "#333";
    }
    function clearSig() { sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height); }

    async function finalizeRelay() {
        // 更新処理（以前と同様）
        const sigImg = sigCanvas.toDataURL();
        const updateFields = isA ? { sig_a_done: true, sig_a_data: sigImg } : { sig_b_done: true, sig_b_data: sigImg, is_agreed: true };
        await supabaseClient.from('forest_plots').update(updateFields).eq('id', targetData.id);
        alert("完了しました");
        location.reload();
    }

    init();
</script>
</body>
</html>
