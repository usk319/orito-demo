<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>織杜 - 森林境界合意システム</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --green: #00B900; --web3: #8247E5; --red: #ff4757; }
        body { margin: 0; font-family: sans-serif; background: #fff; overflow: hidden; height: 100vh; width: 100vw; }
        .view { display: none; height: 100vh; flex-direction: column; overflow-y: auto; }
        .view.active { display: flex; }
        #map-area { flex: 1; position: relative; min-height: 40vh; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        #detail-area { background: #fff; border-top: 5px solid var(--green); display: none; padding: 15px; overflow-y: auto; height: 60vh; }
        body.mode-split #detail-area { display: block; }
        body.mode-split #map-area { flex: 0.4; }
        .sig-container { background: #f9f9f9; padding: 15px; border-radius: 15px; margin-bottom: 10px; }
        .sig-box { border: 2px dashed #ccc; background: #fff; border-radius: 10px; touch-action: none; width: 100%; height: 110px; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 14px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--green); color: white; }
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
        .photo-item { border-radius: 8px; overflow: hidden; aspect-ratio: 4/3; background: #eee; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        #pdf-progress { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; align-items: center; justify-content: center; z-index: 10000; flex-direction: column; }
    </style>
</head>
<body>

<div id="pdf-progress"><div style="color:var(--green); font-weight:bold;">証明書をLINEで送信中...</div></div>

<div id="entry-view" class="view active" style="align-items:center; justify-content:center; padding:30px;">
    <h1 style="color:var(--green)">織杜 - ORITO</h1>
    <p>森林招待コードを入力してください</p>
    <input type="text" id="invite-input" style="width:100%; padding:20px; font-size:24px; border:1px solid #ddd; border-radius:15px; text-align:center;" placeholder="CODE001">
    <button class="btn btn-primary" onclick="verifyCode()">境界を確認する</button>
</div>

<div id="kyc-view" class="view" style="padding:20px;">
    <h3>本人確認 & 現場記録</h3>
    <button class="btn" style="background:#eee;" onclick="document.getElementById('file-kyc').click()">📷 カメラを起動</button>
    <input type="file" id="file-kyc" accept="image/*" capture="environment" style="display:none" onchange="handlePreview(this, 'preview-kyc')">
    <img id="preview-kyc" style="width:100%; margin-top:10px; display:none; border-radius:10px;">
    <button class="btn btn-primary" onclick="changeView('map-view')">地図を確認する</button>
</div>

<div id="map-view" class="view">
    <div id="map-area"><div id="map"></div></div>
    <div id="detail-area">
        <h2 id="parcel-name">地番：---</h2>
        <div id="photo-list" class="photo-grid"></div>
        <textarea id="owner-msg" style="width:100%; height:60px; border-radius:10px; border:1px solid #ddd; padding:10px;" placeholder="メッセージ"></textarea>
        <button class="btn btn-primary" onclick="changeView('agree-view')">合意署名へ進む</button>
        <button class="btn" style="background:#eee;" onclick="closeDetail()">✕ 閉じる</button>
    </div>
</div>

<div id="agree-view" class="view" style="padding:20px; text-align:center;">
    <h3>デジタル署名</h3>
    <p id="sign-role" style="font-weight:bold; color:var(--web3);"></p>
    <div class="sig-container">
        <div style="font-size:12px; text-align:left;">苗字</div>
        <canvas id="sig-surname" class="sig-box"></canvas>
        <div style="font-size:12px; text-align:left; margin-top:10px;">名前</div>
        <canvas id="sig-given" class="sig-box"></canvas>
    </div>
    <button onclick="clearSigs()" style="border:none; background:none; color:var(--red);">書き直す</button>
    <button class="btn btn-primary" style="background:var(--web3);" onclick="finalizeRelay()">署名してPDFを発行</button>
</div>

<div id="pdf-overlay" style="position:fixed; top:0; left:20000px; width:210mm;"><div id="pdf-template"></div></div>

<script>
    // ★エラー修正：成功した方のURLとKeyに統一
    const supabaseClient = window.supabase.createClient('https://uggpclqqyaailuadgzxv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnZ3BjbHFxeWFhaWx1YWRnenh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MzE0NTgsImV4cCI6MjA5MDEwNzQ1OH0.jY5jJuJUgwbIZm8y-jJvEH27eAP9m9semR3MbLxVxGo');
    let targetData, mapInstance, sigSurnameCtx, sigGivenCtx, isA = true;

    async function init() {
        try { await liff.init({ liffId: "2009576392-CvuNETRQ" }); } catch(e) {}
    }

    async function verifyCode() {
        const code = document.getElementById('invite-input').value.toUpperCase().trim();
        const { data, error } = await supabaseClient.from('forest_plots').select('*').eq('invitation_code', code).single();
        if (error || !data) return alert("招待コードが無効です。Supabaseのデータを確認してください。");
        targetData = data;
        isA = !data.sig_a_done;
        document.getElementById('sign-role').innerText = isA ? "【甲：地権者】として署名" : "【乙：隣接者】として署名";
        changeView('kyc-view');
    }

    function initMap() {
        if (mapInstance) return;
        mapInstance = new maplibregl.Map({
            container: 'map',
            style: { "version": 8, "glyphs": "https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf",
                "sources": { "gsi": { "type": "raster", "tiles": ["https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg"], "tileSize": 256 } }, 
                "layers": [{ "id": "gsi", "type": "raster", "source": "gsi" }] },
            center: [131.39, 31.99], zoom: 17, preserveDrawingBuffer: true
        });

        mapInstance.on('load', async () => {
            const { data: geoData } = await supabaseClient.rpc('get_forest_geojson');
            const myFeat = geoData.features.find(f => f.properties.id === targetData.id);
            const color = targetData.is_agreed ? "#00B900" : (targetData.sig_a_done ? "#FFD32A" : "#FF4757");

            mapInstance.addSource('plot-src', { 'type': 'geojson', 'data': myFeat });
            mapInstance.addLayer({ 'id': 'fill', 'type': 'fill', 'source': 'plot-src', 'paint': { 'fill-opacity': 0.2, 'fill-color': color } });
            mapInstance.addLayer({ 'id': 'line', 'type': 'line', 'source': 'plot-src', 'paint': { 'line-color': color, 'line-width': 4 } });

            mapInstance.on('click', 'fill', showDetail);
            const ring = myFeat.geometry.coordinates[0][0] || myFeat.geometry.coordinates[0];
            const bounds = new maplibregl.LngLatBounds();
            ring.forEach(c => bounds.extend(c));
            mapInstance.fitBounds(bounds, { padding: 50 });
        });
    }

    function showDetail() {
        document.getElementById('parcel-name').innerText = `地番：${targetData.parcel_number}`;
        document.body.classList.add('mode-split');
        setTimeout(() => mapInstance.resize(), 300);
    }

    function closeDetail() { document.body.classList.remove('mode-split'); setTimeout(() => mapInstance.resize(), 300); }

    function changeView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'map-view') setTimeout(initMap, 300);
        if (id === 'agree-view') setTimeout(initDoubleSignature, 500);
    }

    function initDoubleSignature() {
        const setup = (id) => {
            const canvas = document.getElementById(id);
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            const ctx = canvas.getContext('2d');
            let drawing = false;
            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const cx = e.touches ? e.touches[0].clientX : e.clientX;
                const cy = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: cx - rect.left, y: cy - rect.top };
            };
            canvas.addEventListener('touchstart', (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); e.preventDefault(); });
            canvas.addEventListener('touchmove', (e) => { if(!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); });
            window.addEventListener('touchend', () => drawing = false);
            ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.strokeStyle = "#000";
            return ctx;
        };
        sigSurnameCtx = setup('sig-surname');
        sigGivenCtx = setup('sig-given');
    }

    function clearSigs() {
        document.getElementById('sig-surname').getContext('2d').clearRect(0,0,999,999);
        document.getElementById('sig-given').getContext('2d').clearRect(0,0,999,999);
    }

    async function finalizeRelay() {
        document.getElementById('pdf-progress').style.display = 'flex';
        const combined = document.createElement('canvas');
        combined.width = 300; combined.height = 300;
        const cctx = combined.getContext('2d');
        cctx.fillStyle = "white"; cctx.fillRect(0,0,300,300);
        cctx.drawImage(document.getElementById('sig-surname'), 0, 0, 300, 150);
        cctx.drawImage(document.getElementById('sig-given'), 0, 150, 300, 150);
        const sigData = combined.toDataURL("image/png");

        const updateFields = isA ? { sig_a_done: true, sig_a_data: sigData } : { sig_b_done: true, sig_b_data: sigData, is_agreed: true };
        await supabaseClient.from('forest_plots').update(updateFields).eq('id', targetData.id);
        
        const { data: updated } = await supabaseClient.from('forest_plots').select('*').eq('id', targetData.id).single();
        if (updated.sig_a_done && updated.sig_b_done) {
            await generateAndSendPDF(updated);
        } else {
            alert("署名を保存しました。お隣さんの署名を待ちます。");
            location.reload();
        }
    }

    async function generateAndSendPDF(plot) {
        const template = document.getElementById('pdf-template');
        template.innerHTML = `
            <div style="padding:20mm; background:white; font-family:serif;">
                <h1 style="text-align:center; border-bottom:3px solid #00B900;">山林境界合意証明書</h1>
                <p style="font-size:18px;">地番：${plot.parcel_number}</p>
                <div style="display:flex; justify-content:space-around; margin-top:50px;">
                    <div style="text-align:center; border:1px solid #000; padding:10px; width:120px;">
                        <p style="font-size:10px;">甲：署名印</p>
                        <img src="${plot.sig_a_data}" style="width:100px; height:100px; object-fit:contain;">
                    </div>
                    <div style="text-align:center; border:1px solid #000; padding:10px; width:120px;">
                        <p style="font-size:10px;">乙：署名印</p>
                        <img src="${plot.sig_b_data}" style="width:100px; height:100px; object-fit:contain;">
                    </div>
                </div>
                <div style="margin-top:50px; text-align:center; color:#00B900; font-weight:bold;">織杜 - ORITO SYSTEM 認証済み</div>
            </div>`;
        
        const pdfBlob = await html2pdf().set({ margin:0, html2canvas:{scale:2}, jsPDF:{unit:'mm', format:'a4'} }).from(template).output('blob');
        const fileName = `Cert_${plot.id}.pdf`;
        await supabaseClient.storage.from('pdfs').upload(fileName, pdfBlob, {contentType:'application/pdf', upsert:true});
        const { data: { publicUrl } } = supabaseClient.storage.from('pdfs').getPublicUrl(fileName);

        // ★LINEへ自動送信
        if (liff.isInClient()) {
            await liff.sendMessages([{
                type: "flex", altText: "証明書が発行されました",
                contents: { type: "bubble", body: { type: "box", layout: "vertical", contents: [
                    { type: "text", text: "境界合意証明書", weight: "bold", size: "xl", color: "#00B900" },
                    { type: "text", text: `地番：${plot.parcel_number}`, size: "sm" }
                ]}, footer: { type: "box", layout: "vertical", contents: [
                    { type: "button", action: { type: "uri", label: "証明書を表示", uri: publicUrl }, style: "primary", color: "#00B900" }
                ]}}
            }]);
        }
        alert("証明書をLINEで送信しました。");
        location.reload();
    }

    function handlePreview(input, id) {
        const f = input.files[0];
        if (f) { const r = new FileReader(); r.onload = (e) => { const i = document.getElementById(id); i.src = e.target.result; i.style.display = 'block'; }; r.readAsDataURL(f); }
    }

    init();
</script>
</body>
</html>
