<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>織杜 - 森林境界リレー合意システム</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

    <style>
        :root { --green: #00B900; --yellow: #FFD32A; --red: #ff4757; --blue: #007bff; --web3: #8247E5; }
        body { margin: 0; font-family: sans-serif; background: #fff; overflow: hidden; height: 100vh; width: 100vw; }
        .view { display: none; height: 100vh; flex-direction: column; overflow-y: auto; }
        .view.active { display: flex; }
        
        /* 地図・スプリット */
        #map-area { flex: 1; position: relative; width: 100%; min-height: 40vh; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        #detail-area { background: #fff; border-top: 5px solid var(--green); display: none; padding: 15px; overflow-y: auto; height: 60vh; }
        body.mode-split #detail-area { display: block; }
        body.mode-split #map-area { flex: 0.4; }

        /* 写真連動ハイライト */
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .photo-item { position: relative; border-radius: 10px; overflow: hidden; aspect-ratio: 4/3; border: 3px solid transparent; transition: 0.3s; }
        .photo-item.highlight { border-color: var(--blue); transform: scale(1.02); box-shadow: 0 0 15px rgba(0,123,255,0.5); z-index: 10; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        .photo-badge { position: absolute; top: 5px; left: 5px; background: var(--blue); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; }

        /* UIパーツ */
        .input-field { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 10px; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 14px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--green); color: white; }
        .btn-danger { background: #fff; color: var(--red); border: 2px solid var(--red); }
        
        /* 署名エリア */
        .sig-container { background: #f9f9f9; padding: 15px; border-radius: 15px; margin-bottom: 10px; }
        .sig-box { border: 2px dashed #ccc; background: #fff; border-radius: 10px; touch-action: none; width: 100%; height: 110px; }
        
        #pdf-progress { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; align-items: center; justify-content: center; z-index: 10000; flex-direction: column; font-weight: bold; }
    </style>
</head>
<body>

<div id="pdf-progress"><div style="color:var(--green); font-size:20px;">証明書をLINEで送信中...</div></div>

<div id="entry-view" class="view active" style="align-items:center; justify-content:center; padding:30px;">
    <h1 style="color:var(--green)">織杜 - ORITO</h1>
    <p>森林招待コードを入力してください</p>
    <input type="text" id="invite-input" class="input-field" style="text-align:center; font-size:24px; letter-spacing:5px;" placeholder="CODE001">
    <button class="btn btn-primary" onclick="verifyCode()">境界を確認する</button>
</div>

<div id="kyc-view" class="view" style="padding:20px;">
    <h3>本人確認 & 住所入力</h3>
    <input type="text" id="owner-address" class="input-field" placeholder="現住所（住民票記載の住所）">
    <div style="background:#f9f9f9; padding:20px; border-radius:15px; border:1px solid #eee; margin-bottom:15px; text-align:center;">
        <p style="font-size:12px; margin-bottom:10px;">【必須】身分証明書 (eKYC)</p>
        <button class="btn" style="background:#fff; border:1px solid #ddd;" onclick="document.getElementById('file-kyc').click()">📷 カメラ起動</button>
        <input type="file" id="file-kyc" accept="image/*" capture="environment" style="display:none" onchange="handlePreview(this, 'preview-kyc')">
        <img id="preview-kyc" style="width:100%; margin-top:10px; display:none; border-radius:10px;">
    </div>
    <button class="btn btn-primary" onclick="changeView('map-view')">地図で境界を確認</button>
</div>

<div id="map-view" class="view">
    <div id="map-area"><div id="map"></div></div>
    <div id="detail-area">
        <h2 id="parcel-name" style="margin:0;">地番：---</h2>
        <div id="photo-list" class="photo-grid"></div>
        <textarea id="owner-msg" class="input-field" style="height:60px;" placeholder="要望・メッセージがあれば入力"></textarea>
        <button class="btn btn-primary" onclick="changeView('agree-view')">合意署名へ進む</button>
        <button class="btn btn-danger" onclick="finalizeProcess(false)">今回は合意しない</button>
        <button class="btn" style="background:#eee;" onclick="closeDetail()">✕ 閉じる</button>
    </div>
</div>

<div id="agree-view" class="view" style="padding:20px; text-align:center;">
    <h3>デジタル署名</h3>
    <p id="sign-role" style="font-weight:bold; color:var(--web3);"></p>
    <div class="sig-container">
        <div style="font-size:12px; text-align:left;">苗字 (Surname)</div>
        <canvas id="sig-surname" class="sig-box"></canvas>
        <div style="font-size:12px; text-align:left; margin-top:10px;">名前 (Given Name)</div>
        <canvas id="sig-given" class="sig-box"></canvas>
    </div>
    <button onclick="clearSigs()" style="border:none; background:none; color:var(--red);">書き直す</button>
    <button class="btn btn-primary" style="background:var(--web3);" onclick="finalizeProcess(true)">署名を完了する</button>
</div>

<div id="pdf-overlay" style="position:fixed; top:0; left:20000px; width:210mm;"><div id="pdf-template"></div></div>

<script>
    const supabaseClient = window.supabase.createClient('https://uggpclqqyaailuadgzxv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnZ3BjbHFxeWFhaWx1YWRnenh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MzE0NTgsImV4cCI6MjA5MDEwNzQ1OH0.jY5jJuJUgwbIZm8y-jJvEH27eAP9m9semR3MbLxVxGo');
    let targetData, mapInstance, sigSurnameCtx, sigGivenCtx, isOwner = true, lineUserId = "";

    async function init() {
        try { 
            await liff.init({ liffId: "2009576392-CvuNETRQ" }); 
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                lineUserId = profile.userId;
            }
        } catch(e) {}
    }

    function getUrls(data) {
        if (!data) return [];
        if (Array.isArray(data)) return data.filter(u => String(u).startsWith('http'));
        const matches = String(data).match(/https?:\/\/[^\s,"{}]+/g);
        return matches ? matches.map(u => u.replace(/[\]\}\s,]+$/, '')) : [];
    }

    async function verifyCode() {
        const code = document.getElementById('invite-input').value.toUpperCase().trim();
        const { data, error } = await supabaseClient.from('forest_plots').select('*').eq('invitation_code', code).single();
        if (error || !data) return alert("招待コードが無効です。");
        targetData = data;
        isOwner = !data.sig_a_done;
        document.getElementById('sign-role').innerText = isOwner ? "【所有者】として署名" : "【隣接所有者】として署名";
        if(data.owner_address) document.getElementById('owner-address').value = data.owner_address;
        changeView('kyc-view');
    }

    function initMap() {
        if (mapInstance) return;
        mapInstance = new maplibregl.Map({
            container: 'map',
            style: { "version": 8, "glyphs": "https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf",
                "sources": { "gsi": { "type": "raster", "tiles": ["https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg"], "tileSize": 256 } }, 
                "layers": [{ "id": "gsi", "type": "raster", "source": "gsi" }] },
            center: [131.39, 31.99], zoom: 17, preserveDrawingBuffer: true
        });

        mapInstance.on('load', async () => {
            const { data: geoData } = await supabaseClient.rpc('get_forest_geojson');
            
            // ★LINE ID制限: 自分が関わるポリゴンまたは未着手のもののみ表示
            const filtered = geoData.features.filter(f => {
                const p = f.properties;
                return !p.owner_line_id || p.owner_line_id === lineUserId || p.adjacent_line_id === lineUserId || p.id === targetData.id;
            });

            // 着色ロジック
            const colorExpr = [
                'case',
                ['==', ['get', 'is_agreed'], false], '#ff4757', // 否認: 赤
                ['all', ['get', 'sig_a_done'], ['get', 'sig_b_done']], '#00B900', // 合意完了: 緑
                ['get', 'sig_a_done'], '#FFD32A', // 所有者署名済: 黄
                '#ff4757' // 未着手: 赤
            ];

            mapInstance.addSource('plot-src', { 'type': 'geojson', 'data': { type: "FeatureCollection", features: filtered } });
            mapInstance.addLayer({ 'id': 'fill', 'type': 'fill', 'source': 'plot-src', 'paint': { 'fill-opacity': 0.25, 'fill-color': colorExpr } });
            mapInstance.addLayer({ 'id': 'line', 'type': 'line', 'source': 'plot-src', 'paint': { 'line-color': colorExpr, 'line-width': 5 } });

            // ポイント(杭)と写真の連動
            const photos = getUrls(targetData.evidence_photo_url);
            const myFeat = filtered.find(f => f.properties.id === targetData.id);
            let ring = (myFeat.geometry.type === 'MultiPolygon') ? myFeat.geometry.coordinates[0][0] : myFeat.geometry.coordinates[0];
            
            const pointFeatures = photos.map((url, i) => {
                const step = Math.floor((i / photos.length) * (ring.length - 1));
                return { "type": "Feature", "geometry": { "type": "Point", "coordinates": ring[step] }, "properties": { "idx": (i + 1).toString() } };
            });

            mapInstance.addSource('pts-src', { 'type': 'geojson', 'data': { "type": "FeatureCollection", "features": pointFeatures } });
            mapInstance.addLayer({ 'id': 'pts-c', 'type': 'circle', 'source': 'pts-src', 'paint': { 'circle-radius': 12, 'circle-color': '#007bff', 'circle-stroke-width': 2, 'circle-stroke-color': '#fff' } });
            mapInstance.addLayer({ 'id': 'pts-l', 'type': 'symbol', 'source': 'pts-src', 'layout': { 'text-field': ['get', 'idx'], 'text-size': 11 }, 'paint': { 'text-color': '#fff' } });

            mapInstance.on('click', 'fill', () => showDetail());
            mapInstance.on('click', 'pts-c', (e) => highlightPhoto(e.features[0].properties.idx));

            const bounds = new maplibregl.LngLatBounds();
            ring.forEach(c => bounds.extend(c));
            mapInstance.fitBounds(bounds, { padding: 50 });
        });
    }

    function highlightPhoto(idx) {
        showDetail();
        setTimeout(() => {
            document.querySelectorAll('.photo-item').forEach(el => el.classList.remove('highlight'));
            const target = document.getElementById(`photo-${idx}`);
            if(target) {
                target.classList.add('highlight');
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }, 500);
    }

    function showDetail() {
        document.getElementById('parcel-name').innerText = `地番：${targetData.parcel_number}`;
        const urls = getUrls(targetData.evidence_photo_url);
        document.getElementById('photo-list').innerHTML = urls.map((u, i) => `<div class="photo-item" id="photo-${i+1}"><span class="photo-badge">No.${i+1}</span><img src="${u}"></div>`).join('');
        document.body.classList.add('mode-split');
        setTimeout(() => mapInstance.resize(), 300);
    }

    function closeDetail() { document.body.classList.remove('mode-split'); setTimeout(() => mapInstance.resize(), 300); }

    function changeView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'map-view') setTimeout(initMap, 300);
        if (id === 'agree-view') setTimeout(initDoubleSignature, 500);
    }

    function initDoubleSignature() {
        const setup = (id) => {
            const canvas = document.getElementById(id);
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            const ctx = canvas.getContext('2d');
            let drawing = false;
            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const cx = e.touches ? e.touches[0].clientX : e.clientX;
                const cy = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: cx - rect.left, y: cy - rect.top };
            };
            canvas.addEventListener('touchstart', (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); e.preventDefault(); });
            canvas.addEventListener('touchmove', (e) => { if(!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); });
            window.addEventListener('touchend', () => drawing = false);
            ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.strokeStyle = "#000";
            return ctx;
        };
        sigSurnameCtx = setup('sig-surname');
        sigGivenCtx = setup('sig-given');
    }

    function clearSigs() {
        document.getElementById('sig-surname').getContext('2d').clearRect(0,0,999,999);
        document.getElementById('sig-given').getContext('2d').clearRect(0,0,999,999);
    }

    async function finalizeProcess(isAgreed) {
        document.getElementById('pdf-progress').style.display = 'flex';
        let sigData = null;
        if(isAgreed) {
            const combined = document.createElement('canvas');
            combined.width = 300; combined.height = 300;
            const cctx = combined.getContext('2d');
            cctx.fillStyle = "white"; cctx.fillRect(0,0,300,300);
            cctx.drawImage(document.getElementById('sig-surname'), 0, 0, 300, 150);
            cctx.drawImage(document.getElementById('sig-given'), 0, 150, 300, 150);
            sigData = combined.toDataURL("image/png");
        }

        const addr = document.getElementById('owner-address').value;
        const msg = document.getElementById('owner-msg').value;

        const updateFields = isOwner 
            ? { sig_a_done: true, sig_a_data: sigData, owner_address: addr, owner_requests: msg, is_agreed: isAgreed, owner_line_id: lineUserId } 
            : { sig_b_done: true, sig_b_data: sigData, is_agreed: isAgreed, adjacent_line_id: lineUserId };

        await supabaseClient.from('forest_plots').update(updateFields).eq('id', targetData.id);
        const { data: updated } = await supabaseClient.from('forest_plots').select('*').eq('id', targetData.id).single();
        
        // ★二人目が署名完了したときのみPDF発行
        if (updated.sig_a_done && updated.sig_b_done && updated.is_agreed !== false) {
            await generateAndSendPDF(updated);
        } else {
            alert(isAgreed ? "署名を記録しました。" : "否認を記録しました。");
            location.reload();
        }
    }

    async function generateAndSendPDF(plot) {
        const template = document.getElementById('pdf-template');
        const mapImg = mapInstance.getCanvas().toDataURL('image/jpeg');
        template.innerHTML = `
            <div style="padding:15mm; font-family: serif; line-height:1.6; background:white; color:#000;">
                <h1 style="text-align:center; text-decoration:underline;">山林境界合意並びに森林現況確認証明書</h1>
                <table style="width:100%; border-collapse:collapse; margin:10px 0; border:2px solid #000;">
                    <tr><td style="background:#eee; padding:10px; border:1px solid #000;">地番</td><td colspan="3" style="padding:10px; border:1px solid #000; font-weight:bold;">${plot.parcel_number}</td></tr>
                    <tr><td style="background:#eee; padding:10px; border:1px solid #000;">面積</td><td style="padding:10px; border:1px solid #000;">${plot.area_ha} ha</td><td style="background:#eee; padding:10px; border:1px solid #000;">樹種</td><td style="padding:10px; border:1px solid #000;">${plot.tree_species || 'スギ'}</td></tr>
                    <tr><td style="background:#eee; padding:10px; border:1px solid #000;">現住所</td><td colspan="3" style="padding:10px; border:1px solid #000;">${plot.owner_address || '未記入'}</td></tr>
                </table>
                <h4 style="border-left:5px solid #00B900; padding-left:10px; background:#f4f4f4;">■ 境界確認図</h4>
                <img src="${mapImg}" style="width:100%; height:300px; object-fit:cover; border:1px solid #000;">
                <div style="page-break-before:always;"></div>
                <h4 style="border-left:5px solid #00B900; padding-left:10px; background:#f4f4f4;">■ 合意署名</h4>
                <div style="display:flex; justify-content:space-around; margin-top:30px;">
                    <div style="text-align:center;">
                        <div style="width:140px; height:200px; border:1px solid #eee; padding:5px;">
                            <div style="width:80px; height:80px; border:2px solid red; border-radius:50%; display:flex; align-items:center; justify-content:center; color:red; font-size:10px; font-weight:bold; margin:0 auto; opacity:0.5;">所有者印</div>
                            <img src="${plot.sig_a_data}" style="width:120px; margin-top:10px; object-fit:contain;">
                        </div>
                        <p style="font-size:14px;">所有者（甲）</p>
                    </div>
                    <div style="text-align:center;">
                        <div style="width:140px; height:200px; border:1px solid #eee; padding:5px;">
                            <div style="width:80px; height:80px; border:2px solid red; border-radius:50%; display:flex; align-items:center; justify-content:center; color:red; font-size:10px; font-weight:bold; margin:0 auto; opacity:0.5;">隣接者印</div>
                            <img src="${plot.sig_b_data}" style="width:120px; margin-top:10px; object-fit:contain;">
                        </div>
                        <p style="font-size:14px;">隣接所有者（乙）</p>
                    </div>
                </div>
                <div style="margin-top:30px; font-size:11px;">要望：${plot.owner_requests || 'なし'}</div>
            </div>`;
        
        // 写真Base64変換
        const urls = getUrls(plot.evidence_photo_url);
        const photoDiv = document.createElement('div');
        photoDiv.style.display="flex"; photoDiv.style.flexWrap="wrap";
        for(let u of urls) {
            const b64 = await new Promise(res => {
                const img = new Image(); img.crossOrigin="Anonymous";
                img.onload=()=>{ const c=document.createElement("canvas"); c.width=img.width; c.height=img.height; c.getContext("2d").drawImage(img,0,0); res(c.toDataURL("image/jpeg")); };
                img.src=u;
            });
            photoDiv.innerHTML += `<div style="width:48%; margin:1%; border:1px solid #eee;"><img src="${b64}" style="width:100%; height:150px; object-fit:cover;"></div>`;
        }
        template.querySelector('div').appendChild(photoDiv);

        const pdfBlob = await html2pdf().set({ margin:0, html2canvas:{scale:2, useCORS:true}, jsPDF:{unit:'mm', format:'a4'} }).from(template).output('blob');
        const fileName = `Cert_${plot.id}_${Date.now()}.pdf`;
        await supabaseClient.storage.from('pdfs').upload(fileName, pdfBlob, {contentType:'application/pdf'});
        const { data: { publicUrl } } = supabaseClient.storage.from('pdfs').getPublicUrl(fileName);

        if (liff.isInClient()) {
            await liff.sendMessages([{
                type: "flex", altText: "合意証明書発行",
                contents: { type: "bubble", body: { type: "box", layout: "vertical", contents: [
                    { type: "text", text: "山林境界合意完了", weight: "bold", color: "#00B900", size: "lg" },
                    { type: "text", text: `地番：${plot.parcel_number}`, size: "sm" }
                ]}, footer: { type: "box", layout: "vertical", contents: [
                    { type: "button", action: { type: "uri", label: "証明書を表示", uri: publicUrl }, style: "primary", color: "#00B900" }
                ]}}
            }]);
        }
        alert("証明書をLINEで送信しました。");
        location.reload();
    }

    function handlePreview(input, id) {
        const f = input.files[0];
        if (f) { const r = new FileReader(); r.onload = (e) => { const i = document.getElementById(id); i.src = e.target.result; i.style.display = 'block'; }; r.readAsDataURL(f); }
    }

    init();
</script>
</body>
</html>
