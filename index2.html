<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>織杜 - 森林境界リレー合意</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@web3auth/modal@7.3.2/dist/modal.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>

    <style>
        :root { --red: #FF4757; --yellow: #FFD32A; --green: #00B900; --web3: #8247E5; }
        body { margin: 0; font-family: sans-serif; background: #f4f7f6; color: #333; overflow: hidden; height: 100vh; }
        
        /* 状態別カラー */
        .status-red { color: var(--red); }
        .status-yellow { color: var(--yellow); }
        .status-green { color: var(--green); }

        /* 画面セクション */
        .view { display: none; height: 100vh; flex-direction: column; }
        .view.active { display: flex; }

        /* ログイン・eKYC */
        #entry-view, #kyc-view { align-items: center; justify-content: center; padding: 30px; text-align: center; background: white; }
        .input-code { width: 100%; padding: 20px; font-size: 24px; border: 2px solid #ddd; border-radius: 15px; margin: 20px 0; text-align: center; }
        
        /* 地図エリア */
        #map { flex: 1; width: 100%; }
        .map-overlay { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 8px; font-size: 12px; }

        /* 署名パッド */
        #sig-canvas { border: 2px dashed #ccc; background: #fff; border-radius: 12px; cursor: crosshair; touch-action: none; }

        /* ボタン */
        .btn { width: 100%; padding: 18px; border: none; border-radius: 14px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--green); color: white; }
        .btn-web3 { background: var(--web3); color: white; }
    </style>
</head>
<body>

<div id="entry-view" class="view active">
    <h1 style="color:var(--green)">織杜 - ORITO</h1>
    <p>森林招待コードを入力してください</p>
    <input type="text" id="invite-input" class="input-code" placeholder="CODE001">
    <button class="btn btn-primary" onclick="verifyCode()">境界を確認する</button>
</div>

<div id="kyc-view" class="view">
    <h3>STEP 1: 本人確認</h3>
    <p style="font-size:13px; color:#666;">合意の真正性を守るため、<br>身分証の撮影をお願いします。</p>
    <div style="border:2px dashed #ccc; padding:40px; border-radius:15px; width:100%;" onclick="document.getElementById('kyc-file').click()">
        <span id="kyc-status">📷 タップして撮影</span>
        <input type="file" id="kyc-file" accept="image/*" style="display:none" onchange="onKYCUpload()">
    </div>
    <button id="btn-to-map" class="btn btn-primary" style="margin-top:20px; display:none;" onclick="changeView('map-view')">地図を確認する</button>
</div>

<div id="map-view" class="view" style="position:relative;">
    <div class="map-overlay">
        <b>進捗: </b> <span id="progress-text">---</span>
    </div>
    <div id="map"></div>
    <div id="map-detail" style="padding:20px; background:white; border-top:5px solid var(--green); display:none;">
        <h4 id="parcel-num" style="margin:0;">地番: ---</h4>
        <p id="role-text" style="font-size:12px; color:var(--web3); font-weight:bold;"></p>
        <button class="btn btn-primary" id="btn-start-agree" onclick="changeView('agree-view')">この境界で合意する</button>
    </div>
</div>

<div id="agree-view" class="view" style="padding:20px; background:white;">
    <h3 id="agree-title">最終署名</h3>
    <canvas id="sig-canvas" style="width:100%; height:150px;"></canvas>
    <button onclick="clearSig()" style="border:none; background:none; color:red; margin-bottom:10px;">書き直す</button>
    
    <div id="relay-info" style="font-size:12px; background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:15px;"></div>
    
    <button class="btn btn-web3" onclick="finalizeRelaySignature()">署名してブロックチェーンに記録</button>
    <button class="btn" style="margin-top:10px; background:#eee;" onclick="changeView('map-view')">戻る</button>
</div>

<div id="pdf-overlay" style="position:fixed; top:0; left:20000px; width:210mm;"><div id="pdf-template"></div></div>

<script>
    const CLIENT_ID = "BKbQ1gC-tbzGfCZwx__t5Mj5B6ibWyKosL3DAiyyCrj4PiXvOqY40yrwzOTNQ997eRXYH9EJz69X7rPPrw0Z_yo"; // Web3Authから取得
    const supabase = window.supabase.createClient('https://uggpclqqyaailuadgzxv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnZ3BjbHFxeWFhaWx1YWRnenh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MzE0NTgsImV4cCI6MjA5MDEwNzQ1OH0.jY5jJuJUgwbIZm8y-jJvEH27eAP9m9semR3MbLxVxGo');
    
    let targetData, userProfile, web3auth, isA = true;
    let sigCanvas, sigCtx;

    // --- 1. 初期化 ---
    async function init() {
        await liff.init({ liffId: "2009576392-AWOZ1pmV" });
        userProfile = await liff.getProfile();
        initWeb3Auth();
        initSignature();
    }

    // --- 2. 招待コード & 役割判定 ---
    async function verifyCode() {
        const code = document.getElementById('invite-input').value.toUpperCase();
        const { data, error } = await supabase.from('forest_plots').select('*').eq('invitation_code', code).single();
        
        if (error || !data) return alert("コードが正しくありません");
        
        targetData = data;
        isA = !data.sig_a_done; // 甲がまだなら自分が甲。甲がいれば自分が乙。
        
        document.getElementById('role-text').innerText = isA ? "あなたは【甲：所有者】として署名します" : "あなたは【乙：隣接者】として署名します";
        changeView('kyc-view');
    }

    // --- 3. 地図 (3色分け) ---
    function initMap() {
        const map = new maplibregl.Map({
            container: 'map',
            style: { "version": 8, "sources": { "gsi": { "type": "raster", "tiles": ["https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg"], "tileSize": 256 } }, "layers": [{ "id": "gsi", "type": "raster", "source": "gsi" }] },
            center: [131.39, 31.99], zoom: 17
        });

        map.on('load', async () => {
            const { data } = await supabase.rpc('get_forest_geojson');
            const myFeature = data.features.find(f => f.properties.id === targetData.id);
            
            // 進捗判定と色設定
            const isFinished = myFeature.properties.sig_a_done && myFeature.properties.sig_b_done;
            const isWaiting = myFeature.properties.sig_a_done && !myFeature.properties.sig_b_done;
            const color = isFinished ? "#00B900" : (isWaiting ? "#FFD32A" : "#FF4757");
            
            document.getElementById('progress-text').innerText = isFinished ? "合意完了" : (isWaiting ? "乙の署名待ち" : "未合意");
            
            map.addSource('plot', { 'type': 'geojson', 'data': myFeature });
            map.addLayer({ 'id': 'line', 'type': 'line', 'source': 'plot', 'paint': { 'line-color': color, 'line-width': 6 } });
            
            map.on('click', 'line', () => {
                document.getElementById('parcel-num').innerText = `地番: ${targetData.parcel_number}`;
                document.getElementById('map-detail').style.display = 'block';
            });
        });
    }

    // --- 4. リレー署名 & Web3連携 ---
    async function finalizeRelaySignature() {
        const sigImage = sigCanvas.toDataURL();
        const updateField = isA ? { sig_a_done: true, sig_a_data: sigImage } : { sig_b_done: true, sig_b_data: sigImage, is_agreed: true };

        await supabase.from('forest_plots').update(updateField).eq('id', targetData.id);

        if (!isA) {
            // 2人目の署名が終わった時だけ、ブロックチェーン刻印とLINE通知
            await executeWeb3Hash(); 
            if (liff.isInClient()) {
                await liff.sendMessages([{ type: "text", text: `【境界確定】${targetData.parcel_number} の合意がブロックチェーンに記録されました。` }]);
            }
        }
        
        alert("署名が記録されました。");
        location.reload();
    }

    // --- UI制御・ユーティリティ ---
    function changeView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'map-view') { setTimeout(initMap, 200); }
    }

    function initSignature() {
        sigCanvas = document.getElementById('sig-canvas');
        sigCtx = sigCanvas.getContext('2d');
        sigCanvas.width = sigCanvas.offsetWidth;
        sigCanvas.height = sigCanvas.offsetHeight;
        let drawing = false;
        const start = () => { drawing = true; sigCtx.beginPath(); };
        const move = (e) => { if(!drawing) return; const rect = sigCanvas.getBoundingClientRect(); const x = (e.touches?.[0].clientX || e.clientX) - rect.left; const y = (e.touches?.[0].clientY || e.clientY) - rect.top; sigCtx.lineTo(x, y); sigCtx.stroke(); };
        sigCanvas.addEventListener('mousedown', start); sigCanvas.addEventListener('mousemove', move); window.addEventListener('mouseup', () => drawing = false);
        sigCanvas.addEventListener('touchstart', start); sigCanvas.addEventListener('touchmove', move); window.addEventListener('touchend', () => drawing = false);
    }
    function clearSig() { sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height); }
    function onKYCUpload() { document.getElementById('kyc-status').innerText = "✅ 完了"; document.getElementById('btn-to-map').style.display = "block"; }

    init();
</script>
</body>
</html>
